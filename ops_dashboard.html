<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPs Weekly Dashboard</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .header { background: white; padding: 20px 30px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; }
        .header h1 { color: #333; font-size: 24px; }
        .header-right { display: flex; align-items: center; gap: 15px; }
        .logout-btn { padding: 8px 16px; background: #ea4335; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .logout-btn:hover { background: #c5221f; }
        .container { background: white; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.15); overflow: hidden; max-width: 1400px; margin: 0 auto; }
        .tabs { display: flex; border-bottom: 2px solid #e0e0e0; background: #f5f5f5; }
        .tab-button { flex: 1; padding: 16px 20px; border: none; background: none; cursor: pointer; font-size: 14px; font-weight: 500; color: #666; transition: all 0.3s; border-bottom: 3px solid transparent; margin-bottom: -2px; }
        .tab-button:hover { background: #efefef; color: #333; }
        .tab-button.active { color: #667eea; border-bottom-color: #667eea; background: white; }
        .tab-content { display: none; padding: 30px; animation: fadeIn 0.3s; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .filters { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; padding: 20px; background: #f9f9f9; border-radius: 6px; }
        .filter-group { display: flex; flex-direction: column; }
        .filter-group label { font-size: 12px; font-weight: 600; color: #666; margin-bottom: 6px; text-transform: uppercase; }
        .filter-group select { padding: 10px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; }
        .filter-buttons { display: flex; gap: 10px; grid-column: 1 / -1; }
        .filter-buttons button { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 600; }
        .apply-filters { background: #667eea; color: white; }
        .apply-filters:hover { background: #5568d3; }
        .reset-filters { background: #e0e0e0; color: #333; }
        .reset-filters:hover { background: #d0d0d0; }
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        thead { background: #f0f0f0; }
        th { padding: 12px 15px; text-align: left; font-weight: 600; color: #333; border-bottom: 2px solid #ddd; }
        td { padding: 12px 15px; border-bottom: 1px solid #eee; }
        tbody tr:hover { background: #f9f9f9; }
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; text-align: center; min-width: 80px; }
        .status-completed { background: #c8e6c9; color: #2e7d32; }
        .status-in-process { background: #b3e5fc; color: #01579b; }
        .status-pending { background: #fff9c4; color: #f57f17; }
        .status-postponed { background: #ffccbc; color: #bf360c; }
        .status-other { background: #e0e0e0; color: #666; }
        .loading { text-align: center; padding: 40px; color: #999; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #667eea; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error { background: #ffebee; border: 1px solid #ef5350; color: #c62828; padding: 15px; border-radius: 4px; margin: 15px 0; }
        .no-data { text-align: center; padding: 30px; color: #999; font-size: 14px; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .dashboard-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .dashboard-card h3 { font-size: 14px; opacity: 0.9; margin-bottom: 10px; text-transform: uppercase; }
        .dashboard-card .number { font-size: 32px; font-weight: bold; }
        .refresh-btn { padding: 8px 16px; background: #34a853; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .refresh-btn:hover { background: #2d8e47; }
        .refresh-btn:disabled { background: #ccc; cursor: not-allowed; }
        #g_id_onload { display: none; }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>📊 OPs Weekly Dashboard</h1>
            <small style="color: #999;">Open Links Foundation</small>
        </div>
        <div class="header-right">
            <span id="auth-status" style="font-size: 12px; color: #999;">Not authenticated</span>
            <button id="refresh-btn" class="refresh-btn" onclick="refreshData()" disabled>↻ Refresh</button>
            <div id="google-signin-container"></div>
            <button id="logout-btn" class="logout-btn" style="display:none;" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="container">
        <div class="tabs">
            <button class="tab-button active" onclick="switchTab('dashboard')">Dashboard</button>
            <button class="tab-button" onclick="switchTab('ops-weekly')">Ops Weekly</button>
            <button class="tab-button" onclick="switchTab('cat-mh')">CAT-MH</button>
            <button class="tab-button" onclick="switchTab('cat-cg')">CAT-CG</button>
        </div>

        <div id="dashboard" class="tab-content active">
            <h2>Key Metrics</h2>
            <div class="dashboard-grid">
                <div class="dashboard-card"><h3>Total</h3><div class="number" id="total-actions">-</div></div>
                <div class="dashboard-card"><h3>Completed</h3><div class="number" id="completed-count">-</div></div>
                <div class="dashboard-card"><h3>In Process</h3><div class="number" id="inprocess-count">-</div></div>
                <div class="dashboard-card"><h3>Pending</h3><div class="number" id="pending-count">-</div></div>
            </div>
        </div>

        <div id="ops-weekly" class="tab-content">
            <div class="filters">
                <div class="filter-group"><label>State</label><select id="ops-state-filter"><option value="">All</option></select></div>
                <div class="filter-group"><label>PM</label><select id="ops-pm-filter"><option value="">All</option></select></div>
                <div class="filter-group"><label>District</label><select id="ops-district-filter"><option value="">All</option></select></div>
                <div class="filter-group"><label>Month</label><select id="ops-month-filter"><option value="">All</option></select></div>
                <div class="filter-group"><label>Week</label><select id="ops-week-filter"><option value="">All</option></select></div>
                <div class="filter-buttons">
                    <button class="apply-filters" onclick="applyFilters('ops-weekly')">Apply</button>
                    <button class="reset-filters" onclick="resetFilters('ops-weekly')">Reset</button>
                </div>
            </div>
            <div class="table-wrapper"><div id="ops-weekly-table" class="loading"><div class="spinner"></div><p>Loading...</p></div></div>
        </div>

        <div id="cat-mh" class="tab-content">
            <div class="filters">
                <div class="filter-group"><label>State</label><select id="catmh-state-filter"><option value="">All</option></select></div>
                <div class="filter-group"><label>District</label><select id="catmh-district-filter"><option value="">All</option></select></div>
                <div class="filter-group"><label>PM</label><select id="catmh-pm-filter"><option value="">All</option></select></div>
                <div class="filter-group"><label>Month</label><select id="catmh-month-filter"><option value="">All</option></select></div>
                <div class="filter-group"><label>Status</label><select id="catmh-status-filter"><option value="">All</option></select></div>
                <div class="filter-buttons">
                    <button class="apply-filters" onclick="applyFilters('cat-mh')">Apply</button>
                    <button class="reset-filters" onclick="resetFilters('cat-mh')">Reset</button>
                </div>
            </div>
            <div class="table-wrapper"><div id="cat-mh-table" class="loading"><div class="spinner"></div><p>Loading...</p></div></div>
        </div>

        <div id="cat-cg" class="tab-content">
            <div class="filters">
                <div class="filter-group"><label>State</label><select id="catcg-state-filter"><option value="">All</option></select></div>
                <div class="filter-group"><label>District</label><select id="catcg-district-filter"><option value="">All</option></select></div>
                <div class="filter-group"><label>PM</label><select id="catcg-pm-filter"><option value="">All</option></select></div>
                <div class="filter-group"><label>Month</label><select id="catcg-month-filter"><option value="">All</option></select></div>
                <div class="filter-group"><label>Status</label><select id="catcg-status-filter"><option value="">All</option></select></div>
                <div class="filter-buttons">
                    <button class="apply-filters" onclick="applyFilters('cat-cg')">Apply</button>
                    <button class="reset-filters" onclick="resetFilters('cat-cg')">Reset</button>
                </div>
            </div>
            <div class="table-wrapper"><div id="cat-cg-table" class="loading"><div class="spinner"></div><p>Loading...</p></div></div>
        </div>
    </div>

    <script>
        const CONFIG = {
            CLIENT_ID: '395320399110-mdsf4dmin48kv3jo6hr7hlteqpbk58dk.apps.googleusercontent.com',
            APPS_SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbxy0MlXiu-d8VTSobIok7cQApXVxJicf-Arhz_rHWFkm0DFbGya8DVeiG7lNPz8HIN8/exec',
            FILE_ID: '1E-bpqHMrRY99dxd69JFYNIinc536ByO4pA_-A_lXVMI'
        };

        let authToken = null;
        let allData = { 'ops-weekly': [], 'cat-mh': [], 'cat-cg': [] };
        let filteredData = JSON.parse(JSON.stringify(allData));

        window.onload = function() {
            google.accounts.id.initialize({
                client_id: CONFIG.CLIENT_ID,
                callback: handleCredentialResponse
            });
            
            google.accounts.id.renderButton(
                document.getElementById('google-signin-container'),
                { theme: 'outline', size: 'large', text: 'signin_with' }
            );
        };

        function handleCredentialResponse(response) {
            authToken = response.credential;
            updateAuthUI(true);
            document.getElementById('refresh-btn').disabled = false;
            fetchAllData();
        }

        function updateAuthUI(isAuth) {
            const status = document.getElementById('auth-status');
            const signin = document.getElementById('google-signin-container');
            const logout = document.getElementById('logout-btn');
            
            if (isAuth) {
                signin.style.display = 'none';
                logout.style.display = 'block';
                status.textContent = '✓ Authenticated';
                status.style.color = '#4caf50';
            } else {
                signin.style.display = 'block';
                logout.style.display = 'none';
                status.textContent = 'Not authenticated';
                status.style.color = '#999';
            }
        }

        function logout() {
            google.accounts.id.disableAutoSelect();
            authToken = null;
            updateAuthUI(false);
            document.getElementById('refresh-btn').disabled = true;
            clearAllTables();
        }

        async function fetchAllData() {
            if (!authToken) {
                showError('ops-weekly-table', 'Please sign in first');
                return;
            }

            try {
                showLoading('ops-weekly-table');
                showLoading('cat-mh-table');
                showLoading('cat-cg-table');

                const response = await fetch(CONFIG.APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({
                        fileId: CONFIG.FILE_ID,
                        sheets: ['Ops Weekly', 'CAT-MH', 'CAT-CG']
                    })
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const result = await response.json();
                if (result.success) {
                    allData['ops-weekly'] = result.data['Ops Weekly'] || [];
                    allData['cat-mh'] = result.data['CAT-MH'] || [];
                    allData['cat-cg'] = result.data['CAT-CG'] || [];
                    
                    filteredData = JSON.parse(JSON.stringify(allData));

                    displayTable('ops-weekly-table', allData['ops-weekly']);
                    displayTable('cat-mh-table', allData['cat-mh']);
                    displayTable('cat-cg-table', allData['cat-cg']);
                    
                    populateFilters();
                    updateDashboard();
                } else {
                    throw new Error(result.error || 'Unknown error');
                }
            } catch (error) {
                console.error('Error:', error);
                showError('ops-weekly-table', 'Error: ' + error.message);
                showError('cat-mh-table', 'Error: ' + error.message);
                showError('cat-cg-table', 'Error: ' + error.message);
            }
        }

        function displayTable(elementId, data) {
            const container = document.getElementById(elementId);
            if (!data || data.length === 0) {
                container.innerHTML = '<div class="no-data">No data</div>';
                return;
            }

            let html = '<table><thead><tr>';
            const headers = Object.keys(data[0]);
            headers.forEach(h => html += `<th>${escapeHtml(h)}</th>`);
            html += '</tr></thead><tbody>';

            data.forEach(row => {
                html += '<tr>';
                headers.forEach(h => {
                    let v = row[h] || '';
                    if (h.toLowerCase().includes('status')) {
                        v = `<span class="status-badge ${getStatusClass(v)}">${escapeHtml(v)}</span>`;
                    }
                    html += `<td>${escapeHtml(v)}</td>`;
                });
                html += '</tr>';
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function populateFilters() {
            addFilterOptions('ops-state-filter', allData['ops-weekly'], 'State');
            addFilterOptions('ops-pm-filter', allData['ops-weekly'], 'PM');
            addFilterOptions('ops-district-filter', allData['ops-weekly'], 'District');
            addFilterOptions('ops-month-filter', allData['ops-weekly'], 'Month');
            addFilterOptions('ops-week-filter', allData['ops-weekly'], 'Week');

            addFilterOptions('catmh-state-filter', allData['cat-mh'], 'State');
            addFilterOptions('catmh-district-filter', allData['cat-mh'], 'District');
            addFilterOptions('catmh-pm-filter', allData['cat-mh'], 'PM');
            addFilterOptions('catmh-month-filter', allData['cat-mh'], 'Month');
            addFilterOptions('catmh-status-filter', allData['cat-mh'], 'Status');

            addFilterOptions('catcg-state-filter', allData['cat-cg'], 'State');
            addFilterOptions('catcg-district-filter', allData['cat-cg'], 'District');
            addFilterOptions('catcg-pm-filter', allData['cat-cg'], 'PM');
            addFilterOptions('catcg-month-filter', allData['cat-cg'], 'Month');
            addFilterOptions('catcg-status-filter', allData['cat-cg'], 'Status');
        }

        function addFilterOptions(selectId, data, columnName) {
            const select = document.getElementById(selectId);
            const values = new Set();
            data.forEach(row => {
                if (row[columnName]) values.add(String(row[columnName]).trim());
            });
            Array.from(values).filter(v => v).sort().forEach(v => {
                const opt = document.createElement('option');
                opt.value = v;
                opt.textContent = v;
                select.appendChild(opt);
            });
        }

        function applyFilters(tab) {
            let filters = {};
            if (tab === 'ops-weekly') {
                filters = {
                    'State': document.getElementById('ops-state-filter').value,
                    'PM': document.getElementById('ops-pm-filter').value,
                    'District': document.getElementById('ops-district-filter').value,
                    'Month': document.getElementById('ops-month-filter').value,
                    'Week': document.getElementById('ops-week-filter').value
                };
                filteredData['ops-weekly'] = filterData(allData['ops-weekly'], filters);
                displayTable('ops-weekly-table', filteredData['ops-weekly']);
            }
        }

        function resetFilters(tab) {
            if (tab === 'ops-weekly') {
                document.getElementById('ops-state-filter').value = '';
                document.getElementById('ops-pm-filter').value = '';
                document.getElementById('ops-district-filter').value = '';
                document.getElementById('ops-month-filter').value = '';
                document.getElementById('ops-week-filter').value = '';
                displayTable('ops-weekly-table', allData['ops-weekly']);
            }
        }

        function filterData(data, filters) {
            return data.filter(row => {
                for (const [key, val] of Object.entries(filters)) {
                    if (val && String(row[key] || '').trim() !== val) return false;
                }
                return true;
            });
        }

        function updateDashboard() {
            let total = 0, completed = 0, inProcess = 0, pending = 0;
            [...allData['ops-weekly'], ...allData['cat-mh'], ...allData['cat-cg']].forEach(row => {
                total++;
                const s = String(row['Status'] || '').toLowerCase();
                if (s.includes('completed')) completed++;
                else if (s.includes('process')) inProcess++;
                else if (s.includes('pending')) pending++;
            });
            document.getElementById('total-actions').textContent = total;
            document.getElementById('completed-count').textContent = completed;
            document.getElementById('inprocess-count').textContent = inProcess;
            document.getElementById('pending-count').textContent = pending;
        }

        function switchTab(name) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
            document.getElementById(name).classList.add('active');
            event.target.classList.add('active');
        }

        function getStatusClass(status) {
            const s = String(status).toLowerCase();
            if (s.includes('completed')) return 'status-completed';
            if (s.includes('process')) return 'status-in-process';
            if (s.includes('pending')) return 'status-pending';
            if (s.includes('postponed')) return 'status-postponed';
            return 'status-other';
        }

        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return String(text).replace(/[&<>"']/g, m => map[m]);
        }

        function showError(id, msg) {
            document.getElementById(id).innerHTML = `<div class="error">${escapeHtml(msg)}</div>`;
        }

        function showLoading(id) {
            document.getElementById(id).innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading...</p></div>';
        }

        function clearAllTables() {
            ['ops-weekly-table', 'cat-mh-table', 'cat-cg-table'].forEach(id => {
                document.getElementById(id).innerHTML = '<div class="no-data">Please sign in</div>';
            });
        }

        function refreshData() {
            fetchAllData();
        }
    </script>
</body>
</html>
